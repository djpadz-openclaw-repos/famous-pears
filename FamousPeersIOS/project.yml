name: FamousPeersIOS
options:
  bundleIdPrefix: net.padz.famous-peers
  deploymentTarget:
    iOS: "26.0"
  usesTabs: false
  indentWidth: 2

packages:
  FamousPeersCore:
    path: ../FamousPeersCore

targets:
  FamousPeersIOS:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: FamousPeersIOS
    dependencies:
      - package: FamousPeersCore
    settings:
      PRODUCT_NAME: FamousPeersIOS
      PRODUCT_BUNDLE_IDENTIFIER: net.padz.famous-peers.ios
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: "N2XUW3D6G2"
      SWIFT_VERSION: "5.9"
      IPHONEOS_DEPLOYMENT_TARGET: "26.0"
      GENERATE_INFOPLIST_FILE: YES
    info:
      UILaunchScreen: {}
    schemes:
      FamousPeersIOS:
        build:
          targets:
            FamousPeersIOS: all
        run:
          config: Debug
        test:
          config: Debug
        profile:
          config: Release
        analyze:
          config: Debug
        archive:
          config: Release
