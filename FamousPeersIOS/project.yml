name: FamousPeersIOS
options:
  bundleIdPrefix: com.famous-peers
  deploymentTarget:
    iOS: "16.0"
  usesTabs: false
  indentWidth: 2

packages:
  FamousPeersCore:
    path: ../FamousPeersCore

targets:
  FamousPeersIOS:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: FamousPeersIOS
    dependencies:
      - package: FamousPeersCore
    settings:
      PRODUCT_NAME: FamousPeersIOS
      PRODUCT_BUNDLE_IDENTIFIER: com.famous-peers.ios
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: ""
      SWIFT_VERSION: "5.9"
      IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    schemes:
      FamousPeersIOS:
        build:
          targets:
            FamousPeersIOS: all
        run:
          config: Debug
        test:
          config: Debug
        profile:
          config: Release
        analyze:
          config: Debug
        archive:
          config: Release
