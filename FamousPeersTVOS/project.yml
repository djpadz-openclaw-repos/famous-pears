name: FamousPeersTVOS
options:
  bundleIdPrefix: net.padz.famous-peers
  deploymentTarget:
    tvOS: "26.0"
  usesTabs: false
  indentWidth: 2

packages:
  FamousPeersCore:
    path: ../FamousPeersCore

targets:
  FamousPeersTVOS:
    type: application
    platform: tvOS
    deploymentTarget: "18.6"
    sources:
      - path: FamousPeersTVOS
    dependencies:
      - package: FamousPeersCore
    settings:
      PRODUCT_NAME: FamousPeersTVOS
      PRODUCT_BUNDLE_IDENTIFIER: net.padz.famous-peers.tvos
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: "N2XUW3D6G2"
      SWIFT_VERSION: "5.9"
      TVOS_DEPLOYMENT_TARGET: "26.0"
      GENERATE_INFOPLIST_FILE: YES
    info:
      UILaunchScreen: {}
    schemes:
      FamousPeersTVOS:
        build:
          targets:
            FamousPeersTVOS: all
        run:
          config: Debug
        test:
          config: Debug
        profile:
          config: Release
        analyze:
          config: Debug
        archive:
          config: Release
